name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        working-directory: client/android
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: npm install
        working-directory: client
        run: npm install

      - name: npm run build
        working-directory: client
        run: npm run build

      - name: npx cap sync android
        working-directory: client
        run: npx cap sync android

      - name: Use official Gradle for CI
        working-directory: client/android
        run: |
          sed -i 's|mirrors.cloud.tencent.com/gradle|services.gradle.org/distributions|g' gradle/wrapper/gradle-wrapper.properties

      - name: Gradle assembleDebug
        working-directory: client/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload app-debug.apk
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
